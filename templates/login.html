<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход в Кино-Трекер</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">

    <div class="auth-container">
        <h2>🎬 Вход в трекер</h2>
        
        <!-- Вывод сообщений об ошибках, если они есть -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="auth-error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post">
            <input type="text" name="username" placeholder="Ваше имя пользователя" required autocomplete="username">
            <input type="password" name="password" placeholder="Ваш пароль" required autocomplete="current-password">
            <button type="submit" class="auth-submit-btn">Войти</button>
        </form>
        <p class="auth-switch-text">Нет аккаунта? <a href="/register">Создать новый профиль</a></p>
    </div>

</body>
</html>
